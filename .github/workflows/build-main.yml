name: Main Branch Build with workerd docker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: npm setup
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.24.x"

      - name: npm install and build
        run: |
          cd www
          npm install && npm install -g pnpm

      - name: Install dependencies
        run: |
          go mod tidy
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Install Protoc
        uses: arduino/setup-protoc@v3

      - name: Compile server
        run: bash ./build.sh --current

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Get short commit hash
        id: hash
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Install ko
        run: go install github.com/google/ko@latest

      - name: Build and push image with ko
        env:
          KO_DOCKER_REPO: ghcr.io/${{ github.repository_owner }}/frp-panel
        run: |
          mv .ko.workerd.yaml .ko.yaml
          ko build ./cmd/frpp --sbom=none --bare -t ${{ steps.hash.outputs.short_sha }}
          ko build ./cmd/frpp --sbom=none --bare -t latest
